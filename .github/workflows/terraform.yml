name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Theos Dependencies
      run: |
        brew install ldid xz
        
    - name: Install Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
    - name: Install iOS SDK
      run: |
        export THEOS=~/theos
        cd $THEOS/sdks
        curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1
        
    - name: Build Tweak
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MapReplacer-package
        path: packages/*.deb
        if-no-files-found: error
